# Flatpak Manifest
app-id: dev.mrquantumoff.mcmodpackmanager
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: run_quadrant
rename-icon: logo
rename-desktop-file: Quadrant.desktop

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --share=network
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher

modules:
  - shared-modules/libappindicator/libappindicator-gtk3-12.10.json
  - name: Quadrant
    buildsystem: simple
    sources:
      - type: file
        url: https://github.com/quadrantmc/quadrant/raw/v26.7.4-stable/dev.mrquantumoff.mcmodpackmanager.metainfo.xml
        sha256: da099ab4f255e53186e0360768d62850b63eebf853e44555dbde1279c851403e
      - type: file
        url: https://github.com/quadrantmc/quadrant/releases/download/v26.7.4-stable/Quadrant_26.7.4-stable_amd64.deb
        sha256: 22d0a8a52c082ab4fee4b4502118f82f0bcf1f4f5006f77aef5afb4fc3364a8e
        only-arches: [x86_64]
      - type: file
        url: https://github.com/quadrantmc/quadrant/releases/download/v26.7.4-stable/Quadrant_26.7.4-stable_arm64.deb
        sha256: 2e160f8764aefdd4b739e2f4509b2fa51861f764b033dd3e846535d071edd953
        only-arches: [aarch64]
      - type: file
        path: run_quadrant
      - type: file
        url: https://github.com/QuadrantMC/quadrant/raw/refs/heads/next/public/logo.svg
        sha256: ed2c9b6731b7324355944347d5bc567f1ff9c4a9e2522ed02c4aa6c1181ecba7

    build-commands:
      - ar -x *.deb
      - tar -xf data.tar.gz
      - install -Dm755 usr/bin/quadrant_next -t /app/bin/
      - install -Dm755 run_quadrant -t /app/bin/
      - desktop-file-edit --set-key=Exec --set-value="run_quadrant --noupdater %u" usr/share/applications/Quadrant.desktop
      - install -Dm644 usr/share/applications/Quadrant.desktop -t /app/share/applications/
      - install -Dm644 ${FLATPAK_ID}.metainfo.xml -t /app/share/metainfo/
      - install -Dm644 logo.svg -t /app/share/icons/hicolor/scalable/apps/
