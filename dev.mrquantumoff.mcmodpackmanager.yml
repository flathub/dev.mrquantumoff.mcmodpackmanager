# Flatpak Manifest
app-id: dev.mrquantumoff.mcmodpackmanager
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: run_quadrant
rename-icon: logo
rename-desktop-file: Quadrant.desktop

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --share=network
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher

modules:
  - shared-modules/libappindicator/libappindicator-gtk3-12.10.json
  - name: Quadrant
    buildsystem: simple
    sources:
      - type: file
        url: https://github.com/quadrantmc/quadrant/raw/v26.7.2-stable/dev.mrquantumoff.mcmodpackmanager.metainfo.xml
        sha256: 79676e260ef2b064d5376c12bdb33f1363e768ea08974573665a1e53744cbb88
      - type: file
        url: https://github.com/quadrantmc/quadrant/releases/download/v26.7.2-stable/Quadrant_26.7.2-stable_amd64.deb
        sha256: f15f818b7eebdfe6225597bb88c979cc4ca2baf2f893328effdb26558085246e
        only-arches: [x86_64]
      - type: file
        url: https://github.com/quadrantmc/quadrant/releases/download/v26.7.2-stable/Quadrant_26.7.2-stable_arm64.deb
        sha256: a87e74e06f6ce93efe7df2f5ecf51e3548ef709db7234ee69881f31ce076eaa0
        only-arches: [aarch64]
      - type: file
        path: run_quadrant
      - type: file
        url: https://github.com/QuadrantMC/quadrant/raw/refs/heads/next/public/logo.svg
        sha256: ed2c9b6731b7324355944347d5bc567f1ff9c4a9e2522ed02c4aa6c1181ecba7

    build-commands:
      - ar -x *.deb
      - tar -xf data.tar.gz
      - install -Dm755 usr/bin/quadrant_next -t /app/bin/
      - install -Dm755 run_quadrant -t /app/bin/
      - desktop-file-edit --set-key=Exec --set-value="run_quadrant --noupdater %u" usr/share/applications/Quadrant.desktop
      - install -Dm644 usr/share/applications/Quadrant.desktop -t /app/share/applications/
      - install -Dm644 ${FLATPAK_ID}.metainfo.xml -t /app/share/metainfo/
      - install -Dm644 logo.svg -t /app/share/icons/hicolor/scalable/apps/
