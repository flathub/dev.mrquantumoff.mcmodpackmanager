# Flatpak Manifest
app-id: dev.mrquantumoff.mcmodpackmanager
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
command: run_quadrant
rename-icon: logo
rename-desktop-file: Quadrant.desktop

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --share=network
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher

modules:
  - shared-modules/libappindicator/libappindicator-gtk3-12.10.json
  - name: Quadrant
    buildsystem: simple
    sources:
      - type: file
        url: https://github.com/quadrantmc/quadrant/raw/v26.7.8-stable/dev.mrquantumoff.mcmodpackmanager.metainfo.xml
        sha256: c8f2f6cd19804fd9135666b0a8f19ab6fe65656e17ea10ab01e91b8daf9a2bcd
      - type: file
        url: https://github.com/quadrantmc/quadrant/releases/download/v26.7.8-stable/Quadrant_26.7.8-stable_amd64.deb
        sha256: d894d7c1c0c9c192b72721e092056498748b2fddea85d4731050575931712868
        only-arches: [x86_64]
      - type: file
        url: https://github.com/quadrantmc/quadrant/releases/download/v26.7.8-stable/Quadrant_26.7.8-stable_arm64.deb
        sha256: b28f9a09dfe68188a133ebb981284d95e1c8160f1958a0aca5c3d897d35a30ad
        only-arches: [aarch64]
      - type: file
        path: run_quadrant
      - type: file
        url: https://github.com/QuadrantMC/quadrant/raw/refs/heads/next/public/logo.svg
        sha256: ed2c9b6731b7324355944347d5bc567f1ff9c4a9e2522ed02c4aa6c1181ecba7

    build-commands:
      - ar -x *.deb
      - tar -xf data.tar.gz
      - install -Dm755 usr/bin/quadrant_next -t /app/bin/
      - install -Dm755 run_quadrant -t /app/bin/
      - desktop-file-edit --set-key=Exec --set-value="run_quadrant --noupdater %u" usr/share/applications/Quadrant.desktop
      - install -Dm644 usr/share/applications/Quadrant.desktop -t /app/share/applications/
      - install -Dm644 ${FLATPAK_ID}.metainfo.xml -t /app/share/metainfo/
      - install -Dm644 logo.svg -t /app/share/icons/hicolor/scalable/apps/
